services:
  - type: web
    name: mealbuddy-api
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "uvicorn config.asgi:application --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: mealbuddy-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: mealbuddy-celery
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker -l info"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: mealbuddy-redis
          property: connectionString

  - type: redis
    name: mealbuddy-redis
    ipAllowList: []
