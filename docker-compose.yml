# MealBuddy — full local stack (blueprint Part K).
#   web      Django/ASGI API (HTTP + WebSocket via Channels)
#   worker   Celery worker (recommendation generation, email)
#   beat     Celery beat (scheduled tasks)
#   postgres primary datastore
#   redis    Celery broker + Channels layer + cache
#   frontend Next.js 15 app
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mealbuddy
      POSTGRES_USER: mealbuddy
      POSTGRES_PASSWORD: mealbuddy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealbuddy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_foods &&
             uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: dev-secret-change-me
      DATABASE_URL: postgres://mealbuddy:mealbuddy@postgres:5432/mealbuddy
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: dev-secret-change-me
      DATABASE_URL: postgres://mealbuddy:mealbuddy@postgres:5432/mealbuddy
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - web
      - redis

  beat:
    build: ./backend
    command: celery -A config beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: dev-secret-change-me
      DATABASE_URL: postgres://mealbuddy:mealbuddy@postgres:5432/mealbuddy
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - web

volumes:
  pgdata:
